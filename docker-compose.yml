services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api/app:/app/app
      - ./api/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    restart: unless-stopped
  dbot:
    build:
      context: ./DBot
      dockerfile: Dockerfile
    environment:
      - CHAT_API_URL=http://api:3000
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped